<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра Mazenyuk</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .card {
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px #000;
        }

        img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #00ffcc;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00cc99;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Сурати бозӣ -->
    <img src="https://via.placeholder.com/250x150.png?text=Mazenyuk+Game" alt="Game">

    <h1>Игра Mazenyuk</h1>

    <!-- Кнопка -->
    <button onclick="startGame()">Игра</button>
</div>

<script>
function startGame() {
    // Инҷо ссылкаи бозиро гузор
    window.location.href = "https://www.crazygames.com/ru/game/mazean-com";
}
</script>

</body>
</html>
